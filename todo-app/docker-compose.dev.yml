services:
  app:
    image: todo-frontend-dev
    volumes:
      - ./todo-frontend:/usr/src/app
    environment:
      VITE_BACKEND_URL: http://localhost:8080/api/
    container_name: todo-app-frontend-dev # todo-frontend-dev container name is already taken
  server:
    image: todo-backend-dev
    volumes:
      - ./todo-backend:/usr/src/app
    container_name: todo-app-backend-dev # todo-backend-dev container name is already taken
    environment:
      REDIS_URL: redis://redis:6379
      MONGO_URL: mongodb://the_username:the_password@mongo:27017/the_database
  mongo:
    image: mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
      MONGO_INITDB_DATABASE: the_database
    volumes:
      - ./todo-backend/mongo/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js
      - mongo_data:/data/db
  redis:
    image: redis
    command: ['redis-server', '--appendonly', 'yes'] # Overwrite the CMD
    volumes:
      - ./todo-backend/redis_data:/data
  nginx:
    image: nginx:1.29
    volumes:
      - ./nginx.dev.conf:/etc/nginx/nginx.conf:ro
    ports:
      - 8080:80
    container_name: todo-app-reverse-proxy # reverse-proxy container name already taken (course material)
    depends_on:
      - app # wait for the frontend container to be started
      - server
      - mongo
      - redis
    

volumes:
  mongo_data:
  redis_data: